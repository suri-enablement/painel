<title>Suri · KPIs por Progresso</title>

<style>
  :root{
    --blue:#3d5af1; --blue-dark:#2a3fc4; --blue-bg:#eef1ff; --page-bg:#eef3ff;
    --surface:#ffffff; --ink:#101a33; --muted:#5b6480; --border:#dfe5f8;
    --indigo:#7B78FF; --pink:#FF3CAC; --green:#0fa968; --green-bg:#e3f8ef;
    --amber:#b45309; --amber-bg:#fef3c7; --gold:#caa202; --gold-bg:#fff8e1;
    --pink-text:#c11574; --pink-bg:#ffe4f3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Sora',sans-serif;
    background:
      radial-gradient(1100px 480px at 8% -10%, #dce5ff 0%, transparent 60%),
      radial-gradient(900px 420px at 100% 0%, #e7ecff 0%, transparent 55%),
      var(--page-bg);
    color:var(--ink); min-height:100vh; padding:28px 36px 48px;
  }
  .page{max-width:1320px;margin:0 auto;}

  .topbar{display:flex;align-items:center;gap:18px;margin-bottom:18px;}
  .logo-wrap{display:flex;align-items:center;gap:16px;}
  .logo-wrap img{height:30px;display:block;}
  .divider{width:1px;height:34px;background:var(--border);}
  .title-block h1{margin:0;font-size:21px;font-weight:700;letter-spacing:-0.2px;}
  .title-block p{margin:2px 0 0;font-size:13px;color:var(--muted);font-weight:500;}
  .back-link{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--blue-dark);text-decoration:none;display:flex;align-items:center;gap:5px;}

  /* TABS */
  .kpi-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .kpi-tab{font-family:'Sora',sans-serif;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12.5px;font-weight:700;padding:9px 16px;border-radius:20px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;}
  .kpi-tab:hover{border-color:var(--blue);color:var(--blue-dark);}
  .kpi-tab.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .kpi-tab .dot{width:6px;height:6px;border-radius:50%;background:#cbd2ea;}
  .kpi-tab.active .dot{background:#fff;}
  .kpi-tab.pending .dot{background:var(--amber);}

  /* KPI SUMMARY CARDS */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(208px,1fr));gap:12px;margin-bottom:22px;}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 15px;position:relative;overflow:hidden;}
  .kpi-card .label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .kpi-card .value{font-size:17px;font-weight:700;letter-spacing:-0.2px;display:flex;align-items:baseline;gap:5px;flex-wrap:wrap;line-height:1.3;}
  .kpi-card .sub{font-size:10.5px;color:var(--muted);margin-top:3px;font-weight:500;line-height:1.4;}
  .kpi-card .pip{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;}

  /* CONTROLS */
  .controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:12px;}
  .controls-left,.controls-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .chip-group{display:flex;gap:8px;}
  .chip{font-family:'Sora',sans-serif;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:18px;cursor:pointer;transition:.15s;}
  .chip:hover{border-color:var(--blue);color:var(--blue-dark);}
  .chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .search-input{font-family:'Sora',sans-serif;border:1px solid var(--border);background:var(--surface);color:var(--ink);font-size:12.5px;font-weight:500;padding:7px 12px 7px 32px;border-radius:18px;width:190px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235b6480' stroke-width='2'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");background-repeat:no-repeat;background-position:11px center;}
  .search-input:focus{outline:none;border-color:var(--blue);}
  .search-input::placeholder{color:#9aa3bd;}
  .sort-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:3px;gap:2px;}
  .sort-btn{font-family:'Sora',sans-serif;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;padding:6px 11px;border-radius:15px;cursor:pointer;transition:.15s;}
  .sort-btn:hover{color:var(--blue-dark);}
  .sort-btn.active{background:var(--blue);color:#fff;}
  .date-range{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:5px 8px;font-size:12px;font-weight:600;color:var(--muted);}
  .date-range select{font-family:'Sora',sans-serif;border:none;background:transparent;color:var(--blue-dark);font-size:12.5px;font-weight:700;padding:2px 4px;cursor:pointer;}
  .date-range select:focus{outline:none;}
  .date-range .sep{color:#c3c9e0;}
  .legend{display:flex;align-items:center;gap:12px;font-size:11.5px;color:var(--muted);font-weight:500;}
  .legend .sw{display:inline-flex;align-items:center;gap:5px;}
  .legend .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}

  /* TABLE */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:auto;margin-bottom:18px;}
  table{width:100%;border-collapse:collapse;min-width:1080px;}
  thead th{text-align:left;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:14px 12px;border-bottom:1px solid var(--border);background:#fafbff;position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap;}
  thead th:hover{color:var(--blue-dark);}
  thead th.sorted::after{content:" ▾";font-size:9px;}
  tbody td{padding:11px 12px;border-bottom:1px solid #eef1f9;font-size:13px;font-weight:500;white-space:nowrap;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#fafbff;}

  .closer-name{font-weight:700;font-size:13px;color:var(--ink);}
  .team-badge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:8px;letter-spacing:.03em;}
  .team-MAORI{background:#ecebff;color:var(--indigo);}
  .team-TITANS{background:var(--pink-bg);color:var(--pink-text);}

  .val-cell{display:inline-flex;align-items:center;justify-content:center;min-width:72px;padding:5px 8px;border-radius:8px;font-weight:700;font-size:12.5px;}
  .h-great{background:var(--green-bg);color:var(--green);}
  .h-good{background:var(--blue-bg);color:var(--blue-dark);}
  .h-warn{background:var(--amber-bg);color:var(--amber);}
  .h-bad{background:var(--pink-bg);color:var(--pink-text);}
  .h-na{background:#f1f3f9;color:#aab2c8;font-weight:500;}

  .spark{display:block;}
  .trend-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 10px;border-radius:8px;}
  .trend-up{background:var(--green-bg);color:var(--green);}
  .trend-down{background:var(--pink-bg);color:var(--pink-text);}
  .trend-flat{background:var(--blue-bg);color:var(--blue-dark);}
  .trend-new{background:#f1f3f9;color:#8b93ad;}
  .trend-sub{font-size:11px;color:var(--muted);font-weight:500;display:block;margin-top:3px;}
  .acum-cell{font-weight:800;font-size:13.5px;}
  .flag{font-size:10.5px;color:var(--amber);font-weight:600;margin-top:2px;display:block;}

  /* PENDING STATE */
  .pending-card{background:var(--surface);border:1.5px dashed var(--border);border-radius:16px;padding:40px 36px;text-align:center;}
  .pending-card .icon{font-size:28px;margin-bottom:10px;}
  .pending-card h3{margin:0 0 8px;font-size:16px;font-weight:700;}
  .pending-card p{margin:0 auto 14px;font-size:13px;color:var(--muted);max-width:520px;line-height:1.6;}
  .pending-card .needs{display:inline-block;text-align:left;background:var(--blue-bg);border-radius:10px;padding:12px 16px;font-size:12px;color:var(--blue-dark);font-weight:600;line-height:1.7;}

  .methodology{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;font-size:12.5px;color:var(--muted);line-height:1.6;}
  .methodology strong{color:var(--ink);}

  @media (max-width:900px){.kpis{grid-template-columns:repeat(2,1fr);}body{padding:20px;}}
</style>
<script>
if(sessionStorage.getItem("suri_auth")!=="ok"){
  location.replace("login.html");
}
</script>

function teamAvgForMonth(kpi, month, list){
  const vals = list.map(c=>KPI_CONFIG[kpi].data[c.nome]?.[month]).filter(v=>v!=null);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
}

function heatClass(ratio, higherBetter){
  if(ratio==null) return "h-na";
  if(higherBetter){
    if(ratio>=115) return "h-great";
    if(ratio>=90)  return "h-good";
    if(ratio>=70)  return "h-warn";
    return "h-bad";
  } else {
    if(ratio<=85)  return "h-great";
    if(ratio<=110) return "h-good";
    if(ratio<=130) return "h-warn";
    return "h-bad";
  }
}

function computeMetrics(nome, kpi, months){
  const cfg = KPI_CONFIG[kpi];
  const series = months.map(k=>({key:k, value:cfg.data[nome]?.[k]??null})).filter(s=>s.value!=null);
  const sumV = series.reduce((s,p)=>s+p.value,0);
  const acumulado = series.length ? sumV/series.length : null;

  let trend;
  if(series.length<2){
    trend = {type:"new", label:"Dados insuficientes", slope:null, proj:null};
  } else {
    const last3 = series.slice(-3);
    let slope;
    if(last3.length===2){ slope = last3[1].value - last3[0].value; }
    else {
      slope = ((last3[1].value-last3[0].value) + 2*(last3[2].value-last3[1].value))/3;
    }
    const lastVal = series[series.length-1].value;
    const proj = lastVal + slope;
    const thr = cfg.trendThreshold;
    const pctSlope = lastVal ? (slope/lastVal)*100 : 0;
    const strong = Math.abs(pctSlope) >= 25;
    let type;
    if(kpi==="ticket"){
      type = pctSlope>thr ? "up" : pctSlope<-thr ? "down" : "flat";
    } else {
      // lower is better: going down = "up" (good)
      type = slope < -thr ? "up" : slope > thr ? "down" : "flat";
    }
    const label = type==="up" ? (strong?"Forte ascensão":"Ascensão")
                : type==="down" ? (strong?"Queda acentuada":"Queda")
                : "Estável";
    trend = {type, label, slope, proj, strong, pctSlope};
  }
  return {series, acumulado, trend};
}

function sparklineSVG(series){
  const w=92,h=30,pad=4;
  if(series.length<2) return "";
  const vals=series.map(s=>s.value);
  const min=Math.min(...vals),max=Math.max(...vals),range=(max-min)||1;
  const stepX=(w-pad*2)/(series.length-1);
  const pts=series.map((s,i)=>[pad+i*stepX, h-pad-((s.value-min)/range)*(h-pad*2)]);
  const last=pts[pts.length-1];
  const up=pts[pts.length-1][1]<pts[0][1];
  const stroke=up?"#0fa968":"#FF3CAC";
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${pts.map(p=>p.join(",")).join(" ")}" fill="none" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="2" fill="${stroke}" opacity="0.55"/>`).join("")}
    <circle cx="${last[0]}" cy="${last[1]}" r="2.6" fill="${stroke}"/>
  </svg>`;
}
function trendArrow(type){return type==="up"?"↑":type==="down"?"↓":type==="flat"?"→":"•";}

/* ===================== RENDER KPIs ===================== */
function renderKPIs(list, months, kpi){
  const cfg=KPI_CONFIG[kpi];
  const lastM=months[months.length-1];
  const lastLabel=lastM?MONTH_LABELS[lastM]:"—";
  const withLast=list.filter(c=>cfg.data[c.nome]?.[lastM]!=null);
  const vals=withLast.map(c=>cfg.data[c.nome][lastM]);
  const avg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;

  const withTrend=list.map(c=>({c,m:computeMetrics(c.nome,kpi,months)})).filter(x=>x.m.trend.slope!=null);
  const up=withTrend.filter(x=>x.m.trend.type==="up").length;
  const down=withTrend.filter(x=>x.m.trend.type==="down").length;

  const topRiser=withTrend.slice().sort((a,b)=>Math.abs(b.m.trend.pctSlope)-Math.abs(a.m.trend.pctSlope))[0];
  const best=cfg.higherBetter
    ?withLast.slice().sort((a,b)=>cfg.data[b.nome][lastM]-cfg.data[a.nome][lastM])[0]
    :withLast.slice().sort((a,b)=>cfg.data[a.nome][lastM]-cfg.data[b.nome][lastM])[0];

  const bestLabel=cfg.higherBetter?"Maior":"Menor (melhor)";

  document.getElementById("kpis").innerHTML=`
    <div class="kpi-card">
      <div class="label">${cfg.label} do time · ${lastLabel}</div>
      <div class="value">${cfg.fmtAvg(avg)}</div>
      <div class="sub">${withLast.length} closer(s) com dado no mês</div>
    </div>
    <div class="kpi-card">
      <div class="label">Tendência do grupo filtrado</div>
      <div class="value"><span class="pip" style="background:var(--green)"></span>${up} subindo <span style="color:var(--muted);font-weight:600;font-size:14px;">/</span> <span class="pip" style="background:var(--pink)"></span>${down} caindo</div>
      <div class="sub">momentum dos 3 últimos meses do período</div>
    </div>
    <div class="kpi-card">
      <div class="label">${bestLabel} · ${lastLabel}</div>
      <div class="value" style="color:var(--gold)">${best?best.nome:"—"}</div>
      <div class="sub">${best?cfg.fmt(cfg.data[best.nome][lastM]):"—"}</div>
    </div>
    <div class="kpi-card">
      <div class="label">Maior variação no período</div>
      <div class="value" style="color:var(--green)">${topRiser?topRiser.c.nome:"—"}</div>
      <div class="sub">${topRiser?cfg.slopeLabel(topRiser.m.trend.slope)+" slope ponderado":"sem dados suficientes"}</div>
    </div>
  `;
}

  renderHeader(months);
  renderLegend(currentKpi);

  let list=CLOSERS.filter(c=>currentTeam==="all"||c.time===currentTeam);
  const monthList = list; // reference for tooltip ranking (uses all team members, not just filtered by search)
  if(closerQuery.trim()!==""){
    const q=normalize(closerQuery.trim());
    list=list.filter(c=>normalize(c.nome).includes(q));
  }

  const avgs={};
  months.forEach(k=>{ avgs[k]=teamAvgForMonth(currentKpi,k,list); });

  list=list.map(c=>({...c, _m:computeMetrics(c.nome,currentKpi,months)}));

  const k=currentSort.key, dir=currentSort.dir==="asc"?1:-1;
  list.sort((a,b)=>{
    if(k==="nome") return dir*a.nome.localeCompare(b.nome);
    if(k==="time") return dir*a.time.localeCompare(b.time);
    if(months.includes(k)){
      const va=cfg.data[a.nome]?.[k]??-1, vb=cfg.data[b.nome]?.[k]??-1;
      return dir*(va-vb);
    }
    if(k==="tendencia"){
      const va=a._m.trend.slope??-999, vb=b._m.trend.slope??-999;
      return dir*(va-vb);
    }
    if(k==="acumulado"){
      const va=a._m.acumulado??-1, vb=b._m.acumulado??-1;
      return dir*(va-vb);
    }
    return 0;
  });

  renderKPIs(list, months, currentKpi);

  const body=document.getElementById("mainBody");
  if(list.length===0){
    body.innerHTML=`<tr><td colspan="${4+months.length}" style="text-align:center;color:var(--muted);padding:28px;">Nenhum closer encontrado.</td></tr>`;
    return;
  }

  body.innerHTML=list.map(c=>{
    const monthCells=months.map(mk=>{
      const v=cfg.data[c.nome]?.[mk]??null;
      const avg=avgs[mk];
      const ratio=(v!=null&&avg)?( (v/avg)*100 ):null;
      // Rich tooltip: explain the "why" behind each value
      let title;
      if(v==null){
        title = "Sem dado neste mês";
      } else if(currentKpi==="ticket"){
        const rec = RECEITA[c.nome]?.[mk];
        const vnd = VENDAS[c.nome]?.[mk];
        const pos = [...monthList].filter(n=>cfg.data[n.nome]?.[mk]!=null).sort((a,b)=>cfg.data[b.nome][mk]-cfg.data[a.nome][mk]).findIndex(n=>n.nome===c.nome)+1;
        const total = [...monthList].filter(n=>cfg.data[n.nome]?.[mk]!=null).length;
        title = `Ticket: ${cfg.fmt(v)}\nReceita: ${fmtBRL(rec)} ÷ ${vnd} vendas\nMédia do time: ${cfg.fmtAvg(avg)}\nRanking no mês: ${pos}º de ${total}`;
      } else if(currentKpi==="conversao"){
        const vnd = VENDAS[c.nome]?.[mk];
        const reu = REUNIOES[c.nome]?.[mk];
        const pos = [...monthList].filter(n=>cfg.data[n.nome]?.[mk]!=null).sort((a,b)=>cfg.data[b.nome][mk]-cfg.data[a.nome][mk]).findIndex(n=>n.nome===c.nome)+1;
        const total = [...monthList].filter(n=>cfg.data[n.nome]?.[mk]!=null).length;
        title = `Conversão: ${cfg.fmt(v)}\n${vnd} vendas ÷ ${reu} reuniões\nMédia do time: ${cfg.fmtAvg(avg)}\nRanking no mês: ${pos}º de ${total}`;
      } else if(currentKpi==="ciclovenda"){
        const pos = [...monthList].filter(n=>cfg.data[n.nome]?.[mk]!=null).sort((a,b)=>cfg.data[a.nome][mk]-cfg.data[b.nome][mk]).findIndex(n=>n.nome===c.nome)+1;
        const total = [...monthList].filter(n=>cfg.data[n.nome]?.[mk]!=null).length;
        const diff = avg ? v - avg : null;
        const diffStr = diff==null ? "" : (diff>0 ? ` (+${Math.round(diff)} dias acima da média)` : ` (${Math.round(diff)} dias abaixo da média)`);
        title = `Ciclo de Venda: ${v} dias${diffStr}\nMédia do time: ${cfg.fmtAvg(avg)}\nRanking (menor=melhor): ${pos}º de ${total}`;
      } else if(currentKpi==="ciclolost"){
        const pos = [...monthList].filter(n=>cfg.data[n.nome]?.[mk]!=null).sort((a,b)=>cfg.data[a.nome][mk]-cfg.data[b.nome][mk]).findIndex(n=>n.nome===c.nome)+1;
        const total = [...monthList].filter(n=>cfg.data[n.nome]?.[mk]!=null).length;
        const diff = avg ? v - avg : null;
        const diffStr = diff==null ? "" : (diff>0 ? ` (+${Math.round(diff)} dias acima da média)` : ` (${Math.round(diff)} dias abaixo da média)`);
        title = `Ciclo de Lost: ${v} dias${diffStr}\nMédia do time: ${cfg.fmtAvg(avg)}\nRanking (menor=melhor): ${pos}º de ${total}`;
      } else {
        title = `${cfg.label}: ${cfg.fmt(v)} · Média do time: ${cfg.fmtAvg(avg)}`;
      }
      return `<td><span class="val-cell ${heatClass(ratio,cfg.higherBetter)}" title="${title}">${cfg.fmt(v)}</span></td>`;
    }).join("");

    const t=c._m.trend;
    const tc=t.type==="up"?"trend-up":t.type==="down"?"trend-down":t.type==="flat"?"trend-flat":"trend-new";
    const trendHTML=t.slope==null
      ?`<span class="trend-badge ${tc}">${trendArrow(t.type)} ${t.label}</span>`
      :`<span class="trend-badge ${tc}">${trendArrow(t.type)} ${t.label}</span><span class="trend-sub">projeção: ${cfg.projFmt(t.proj)}</span>`;

    let flag="";
    if(c.nome==="Júnior Furtado") flag=`<span class="flag">⚠ pouco histórico</span>`;

    return `<tr>
      <td><span class="closer-name">${c.nome}</span></td>
      <td><span class="team-badge team-${c.time}">${c.time}</span></td>
      ${monthCells}
      <td>${sparklineSVG(c._m.series)}</td>
      <td>${trendHTML}${flag}</td>
      <td class="acum-cell">${cfg.fmtAvg(c._m.acumulado)}</td>
    </tr>`;
  }).join("");

  document.getElementById("methodology").innerHTML=
    `<strong>${cfg.label}:</strong> ${cfg.higherBetter
      ?"células coloridas em relação à média do time no mesmo mês — maior é melhor (verde)."
      :"células coloridas em relação à média do time no mesmo mês — menor é melhor (verde, lógica invertida)."
    } A <strong>tendência</strong> usa inclinação ponderada com peso dobrado para a variação mais recente. A coluna <strong>Média do período</strong> é a média simples do indicador nos meses visíveis.`;
}

/* ===================== EVENTOS ===================== */
document.querySelectorAll("#kpiTabs .kpi-tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll("#kpiTabs .kpi-tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    currentKpi=tab.dataset.kpi;
    currentSort={key:"acumulado",dir:"desc"};
    renderAll();
  });
});
document.querySelectorAll("#teamFilter .chip").forEach(chip=>{
  chip.addEventListener("click",()=>{
    document.querySelectorAll("#teamFilter .chip").forEach(c=>c.classList.remove("active"));
    chip.classList.add("active");
    currentTeam=chip.dataset.team;
    renderAll();
  });
});
document.getElementById("closerSearch").addEventListener("input",e=>{closerQuery=e.target.value;renderAll();});
document.querySelectorAll("#sortToggle .sort-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{currentSort.dir=btn.dataset.dir;updateSortToggleUI();renderAll();});
});

populateDateSelects();
updateSortToggleUI();
renderAll();
</script>
</body>
</html>
