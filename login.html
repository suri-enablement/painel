<head>
<meta charset="UTF-8">

<title>Suri · Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#3d5af1;--blue-dark:#2a3fc4;--blue-bg:#eef1ff;
    --page-bg:#eef3ff;--surface:#ffffff;--ink:#101a33;
    --muted:#5b6480;--border:#dfe5f8;--pink:#FF3CAC;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Sora',sans-serif;
    background:
      radial-gradient(1100px 480px at 8% -10%, #dce5ff 0%, transparent 60%),
      radial-gradient(900px 420px at 100% 0%, #e7ecff 0%, transparent 55%),
      var(--page-bg);
    display:flex;align-items:center;justify-content:center;min-height:100vh;
  }
  .card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:40px 40px 36px;
    width:100%;max-width:380px;
    box-shadow:0 20px 60px -20px rgba(61,90,241,.15);
  }
  .logo{display:flex;justify-content:center;margin-bottom:28px;}
  .logo img{height:28px;}
  h1{font-size:18px;font-weight:700;color:var(--ink);text-align:center;margin-bottom:6px;}
  p{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.5;}
  label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px;}
  .input-wrap{position:relative;margin-bottom:18px;}
  input[type=password]{
    width:100%;font-family:'Sora',sans-serif;
    border:1.5px solid var(--border);border-radius:12px;
    padding:12px 44px 12px 14px;font-size:14px;color:var(--ink);
    background:var(--surface);outline:none;transition:.15s;
  }
  input[type=password]:focus{border-color:var(--blue);}
  .toggle-pw{
    position:absolute;right:13px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;color:var(--muted);padding:0;
    display:flex;align-items:center;
  }
  .toggle-pw:hover{color:var(--blue-dark);}
  .btn{
    width:100%;font-family:'Sora',sans-serif;
    background:var(--blue);color:#fff;border:none;
    border-radius:12px;padding:13px;
    font-size:14px;font-weight:700;cursor:pointer;transition:.15s;
  }
  .btn:hover{background:var(--blue-dark);}
  .btn:active{transform:scale(.98);}
  .error{
    display:none;background:#fff0f5;border:1px solid #ffc0d6;
    border-radius:10px;padding:10px 14px;
    font-size:12.5px;color:#b01a3a;font-weight:600;
    text-align:center;margin-top:14px;
  }
  .error.show{display:block;}
</style>
</head>

  <h1>Painéis Comerciais</h1>
  <p>Acesso restrito à liderança Suri.<br>Insira a senha para continuar.</p>
  <label for="pw">Senha</label>
  <div class="input-wrap">
    <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
    <button class="toggle-pw" type="button" onclick="togglePw()" title="Mostrar/ocultar senha">
      <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>

  <button class="btn" onclick="tryLogin()">Entrar</button>
  <div class="error" id="err">Senha incorreta. Tente novamente.</div>
</div>
<script>
/* Senha: Suri@2026 | Hash SHA-256 armazenado abaixo */
const HASH = "baf95a9cd90135d5ebd883fd061136d729cf9649670e9e1a4e92128f620bcdf0";
const KEY  = "suri_auth";
const DEST = "index.html";

if(sessionStorage.getItem(KEY)==="ok") location.replace(DEST);

async function sha256(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function tryLogin(){
  const pw = document.getElementById("pw").value;
  const h  = await sha256(pw);
  if(h===HASH){
    sessionStorage.setItem(KEY,"ok");
    location.replace(DEST);
  } else {
    document.getElementById("err").classList.add("show");
    document.getElementById("pw").focus();
  }
}
document.getElementById("pw").addEventListener("keydown",e=>{ if(e.key==="Enter") tryLogin(); });

function togglePw(){
  const inp = document.getElementById("pw");
  inp.type = inp.type==="password" ? "text" : "password";
}
</script>
