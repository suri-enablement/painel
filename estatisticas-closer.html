<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suri · Estatísticas por Closer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#3d5af1;
    --blue-dark:#2a3fc4;
    --blue-bg:#eef1ff;
    --page-bg:#eef3ff;
    --surface:#ffffff;
    --ink:#101a33;
    --muted:#5b6480;
    --border:#dfe5f8;
    --indigo:#7B78FF;
    --pink:#FF3CAC;
    --green:#0fa968;
    --green-bg:#e3f8ef;
    --amber:#b45309;
    --amber-bg:#fef3c7;
    --gold:#caa202;
    --pink-text:#c11574;
    --pink-bg:#ffe4f3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Sora',sans-serif;
    background:
      radial-gradient(1100px 480px at 8% -10%, #dce5ff 0%, transparent 60%),
      radial-gradient(900px 420px at 100% 0%, #e7ecff 0%, transparent 55%),
      var(--page-bg);
    color:var(--ink);
    min-height:100vh;
    padding:28px 36px 48px;
  }
  .page{max-width:1280px;margin:0 auto;}

  .topbar{display:flex;align-items:center;gap:18px;margin-bottom:22px;}
  .logo-wrap{display:flex;align-items:center;gap:16px;}
  .logo-wrap img{height:30px;display:block;}
  .divider{width:1px;height:34px;background:var(--border);}
  .title-block h1{margin:0;font-size:21px;font-weight:700;letter-spacing:-0.2px;}
  .title-block p{margin:2px 0 0;font-size:13px;color:var(--muted);font-weight:500;}
  .back-link{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--blue-dark);text-decoration:none;display:flex;align-items:center;gap:5px;}

  /* ---------- PERIOD SELECTOR ---------- */
  .period-row{display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap;}
  .period-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px;gap:2px;}
  .period-btn{
    font-family:'Sora',sans-serif;border:none;background:transparent;color:var(--muted);
    font-size:13px;font-weight:700;padding:9px 18px;border-radius:16px;cursor:pointer;transition:.15s;
  }
  .period-btn:hover{color:var(--blue-dark);}
  .period-btn.active{background:var(--blue);color:#fff;}
  .period-label{font-size:12.5px;color:var(--muted);font-weight:600;background:var(--blue-bg);color:var(--blue-dark);padding:7px 13px;border-radius:14px;}

  /* ---------- CONTROLS ---------- */
  .controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:12px;}
  .controls-left, .controls-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .chip-group{display:flex;gap:8px;}
  .chip{font-family:'Sora',sans-serif;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:18px;cursor:pointer;transition:.15s;}
  .chip:hover{border-color:var(--blue);color:var(--blue-dark);}
  .chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .search-input{
    font-family:'Sora',sans-serif;border:1px solid var(--border);background:var(--surface);color:var(--ink);
    font-size:12.5px;font-weight:500;padding:7px 12px 7px 32px;border-radius:18px;width:190px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235b6480' stroke-width='2'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
    background-repeat:no-repeat;background-position:11px center;
  }
  .search-input:focus{outline:none;border-color:var(--blue);}
  .search-input::placeholder{color:#9aa3bd;}
  .sort-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:3px;gap:2px;}
  .sort-btn{font-family:'Sora',sans-serif;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;padding:6px 11px;border-radius:15px;cursor:pointer;transition:.15s;}
  .sort-btn:hover{color:var(--blue-dark);}
  .sort-btn.active{background:var(--blue);color:#fff;}

  /* ---------- TABLE ---------- */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:auto;margin-bottom:18px;}
  table{width:100%;border-collapse:collapse;min-width:920px;}
  thead th{text-align:left;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:14px 14px;border-bottom:1px solid var(--border);background:#fafbff;position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap;}
  thead th:hover{color:var(--blue-dark);}
  thead th.sorted::after{content:" ▾";font-size:9px;}
  thead th.pending-col{cursor:default;}
  thead th.pending-col:hover{color:var(--muted);}
  tbody td{padding:13px 14px;border-bottom:1px solid #eef1f9;font-size:13px;font-weight:500;white-space:nowrap;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#fafbff;}

  .closer-name{font-weight:700;font-size:13px;color:var(--ink);}
  .team-badge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:8px;letter-spacing:.03em;}
  .team-MAORI{background:#ecebff;color:var(--indigo);}
  .team-TITANS{background:var(--pink-bg);color:var(--pink-text);}

  .pct-cell{display:inline-flex;align-items:center;justify-content:center;min-width:64px;padding:6px 10px;border-radius:8px;font-weight:700;font-size:12.5px;}
  .h-great{background:var(--green-bg);color:var(--green);}
  .h-good{background:var(--blue-bg);color:var(--blue-dark);}
  .h-warn{background:var(--amber-bg);color:var(--amber);}
  .h-bad{background:var(--pink-bg);color:var(--pink-text);}
  .h-na{background:#f1f3f9;color:#aab2c8;font-weight:500;}
  .pending-cell{color:#c3c9e0;font-size:12px;font-weight:600;}

  .legend{display:flex;align-items:center;gap:14px;font-size:11.5px;color:var(--muted);font-weight:500;}
  .legend .sw{display:inline-flex;align-items:center;gap:5px;}
  .legend .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}

  .methodology{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;font-size:12.5px;color:var(--muted);line-height:1.6;}
  .methodology strong{color:var(--ink);}

  @media (max-width:900px){ body{padding:20px;} }
</style>
<script>
if(sessionStorage.getItem("suri_auth")!=="ok"){
  sessionStorage.setItem("suri_return", location.pathname);
  location.replace("login.html");
}
</script>

const SIZE_OPTIONS = ["De 1 a 2 funcionários","Até 4 funcionários","De 3 a 5 funcionários","De 5 a 7 funcionários","De 6 a 9 funcionários","De 8 a 9 funcionários","De 10 a 49 funcionários","De 50 a 99 funcionários","Mais de 100 funcionários","Não informado"];

let currentPeriod = "trimestre";
let currentTeam = "all";
let closerQuery = "";
let currentSize = "all";
let currentSort = {key:"ticket", dir:"desc"};

const TODAY = new Date(); // sempre a data real do dia em que o painel é aberto

function ticketMonthKeys(period){
  // mapeia o período de calendário pra quais chaves jan..dez consultar na tabela de Ticket Médio
  const m = TODAY.getMonth(); // 0-11
  if(period==="mes") return [MONTH_KEY_BY_INDEX[m]];
  if(period==="trimestre"){
    const qStart = Math.floor(m/3)*3;
    return [MONTH_KEY_BY_INDEX[qStart], MONTH_KEY_BY_INDEX[qStart+1], MONTH_KEY_BY_INDEX[qStart+2]];
  }
  // ano: janeiro até o mês atual
  return MONTH_KEY_BY_INDEX.slice(0, m+1);
}
function dateInPeriod(dateObj, period){
  if(dateObj.getFullYear() !== TODAY.getFullYear()) return false;
  if(period==="mes") return dateObj.getMonth()===TODAY.getMonth();
  if(period==="trimestre") return Math.floor(dateObj.getMonth()/3)===Math.floor(TODAY.getMonth()/3);
  return true; // ano: mesmo ano corrente já garantido acima
}
function periodRangeLabel(period){
  const m = TODAY.getMonth(), y = TODAY.getFullYear();
  if(period==="mes") return MONTH_NAME_BY_INDEX[m]+"/"+y;
  if(period==="trimestre"){
    const qStart = Math.floor(m/3)*3;
    return MONTH_NAME_BY_INDEX[qStart]+" – "+MONTH_NAME_BY_INDEX[qStart+2]+"/"+y;
  }
  return "Janeiro – "+MONTH_NAME_BY_INDEX[m]+"/"+y;
}
function normalize(s){ return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase(); }
function fmtBRL(v){ return v==null ? "—" : "R$ " + v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}); }

function heatClass(ratio){
  if(ratio==null) return "h-na";
  if(ratio>=115) return "h-great";
  if(ratio>=90) return "h-good";
  if(ratio>=70) return "h-warn";
  return "h-bad";
}
// pra métricas onde MENOR é melhor (ex.: ciclo de venda/lost em dias)
function heatClassInverse(ratio){
  if(ratio==null) return "h-na";
  if(ratio<=85) return "h-great";
  if(ratio<=110) return "h-good";
  if(ratio<=130) return "h-warn";
  return "h-bad";
}

function computeTicket(c, months){
  const vals = months.map(k=>c.meses[k]).filter(v=>v!=null);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
}

function computeCicloVenda(c, months){
  const vals = months.map(k=>CICLO_VENDA[c.nome]?.[k]).filter(v=>v!=null);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
}

function computeCicloLost(nome, period, size){
  const deals = LOST_CYCLE_DATA[nome] || [];
  const filtered = deals.filter(d=>{
    const dt = new Date(d[0]+"T00:00:00");
    if(!dateInPeriod(dt, period)) return false;
    if(size!=="all" && d[2]!==size) return false;
    return true;
  });
  if(filtered.length===0) return {avg:null, n:0};
  const avg = filtered.reduce((s,d)=>s+d[1],0)/filtered.length;
  return {avg, n:filtered.length};
}

function updateSortToggleUI(){
  document.querySelectorAll("#sortToggle .sort-btn").forEach(b=> b.classList.toggle("active", b.dataset.dir===currentSort.dir));
}
function populateSizeSelect(){
  const sel = document.getElementById("sizeFilter");
  sel.innerHTML = `<option value="all">Todos os portes</option>` + SIZE_OPTIONS.map(s=>`<option value="${s}">${s}</option>`).join("");
  sel.addEventListener("change", ()=>{ currentSize = sel.value; renderAll(); });
}

function renderAll(){
  document.getElementById("periodLabel").textContent = periodRangeLabel(currentPeriod);
  const months = ticketMonthKeys(currentPeriod);

  document.querySelectorAll("#theadRow th").forEach(th=>{
    th.classList.toggle("sorted", th.dataset.key===currentSort.key);
  });

  let list = RAW.filter(c => currentTeam==="all" || c.time===currentTeam);
  if(closerQuery.trim()!==""){
    const q = normalize(closerQuery.trim());
    list = list.filter(c => normalize(c.nome).includes(q));
  }
  list = list.map(c => ({
    ...c,
    ticket: computeTicket(c, months),
    cicloVenda: computeCicloVenda(c, months),
    lost: computeCicloLost(c.nome, currentPeriod, currentSize)
  }));

  const validTickets = list.map(c=>c.ticket).filter(v=>v!=null);
  const teamAvgTicket = validTickets.length ? validTickets.reduce((a,b)=>a+b,0)/validTickets.length : null;

  const validLost = list.map(c=>c.lost.avg).filter(v=>v!=null);
  const teamAvgLost = validLost.length ? validLost.reduce((a,b)=>a+b,0)/validLost.length : null;

  const validVenda = list.map(c=>c.cicloVenda).filter(v=>v!=null);
  const teamAvgVenda = validVenda.length ? validVenda.reduce((a,b)=>a+b,0)/validVenda.length : null;

  const k = currentSort.key, dir = currentSort.dir==="asc" ? 1 : -1;
  list.sort((a,b)=>{
    if(k==="nome") return dir*a.nome.localeCompare(b.nome);
    if(k==="time") return dir*a.time.localeCompare(b.time);
    if(k==="ticket"){
      const va = a.ticket==null? -1 : a.ticket;
      const vb = b.ticket==null? -1 : b.ticket;
      return dir*(va-vb);
    }
    if(k==="ciclovenda"){
      const va = a.cicloVenda==null? -1 : a.cicloVenda;
      const vb = b.cicloVenda==null? -1 : b.cicloVenda;
      return dir*(va-vb);
    }
    if(k==="ciclolost"){
      const va = a.lost.avg==null? -1 : a.lost.avg;
      const vb = b.lost.avg==null? -1 : b.lost.avg;
      return dir*(va-vb);
    }
    return 0; // colunas ainda pendentes não ordenam
  });

  const body = document.getElementById("closerBody");
  if(list.length===0){
    body.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:28px;">Nenhum closer encontrado para esse filtro.</td></tr>`;
    return;
  }

  body.innerHTML = list.map(c=>{
    const ratioTicket = (c.ticket!=null && teamAvgTicket) ? (c.ticket/teamAvgTicket)*100 : null;
    const titleTicket = c.ticket==null ? "Mês ainda não fechado no relatório de metas" : `Ticket médio: ${fmtBRL(c.ticket)} · Média do time no período: ${fmtBRL(teamAvgTicket)}`;

    const ratioLost = (c.lost.avg!=null && teamAvgLost) ? (c.lost.avg/teamAvgLost)*100 : null;
    const lostText = c.lost.avg==null ? "—" : Math.round(c.lost.avg)+" dias";
    const titleLost = c.lost.avg==null ? "Sem negócio perdido nesse filtro/período" : `Ciclo médio: ${lostText} · Média do time: ${Math.round(teamAvgLost)} dias · ${c.lost.n} negócio(s) perdido(s)`;

    return `<tr>
      <td><span class="closer-name">${c.nome}</span></td>
      <td><span class="team-badge team-${c.time}">${c.time}</span></td>
      <td><span class="pct-cell ${heatClass(ratioTicket)}" title="${titleTicket}">${fmtBRL(c.ticket)}</span></td>
      <td><span class="pending-cell">— aguardando dado</span></td>
      <td>${(()=>{
        const ratioV = (c.cicloVenda!=null && teamAvgVenda) ? (c.cicloVenda/teamAvgVenda)*100 : null;
        const vendaText = c.cicloVenda==null ? "—" : Math.round(c.cicloVenda)+" dias";
        const titleVenda = c.cicloVenda==null ? "Sem negócio ganho nesse período" : `Ciclo médio: ${vendaText} · Média do time: ${Math.round(teamAvgVenda)} dias`;
        return `<span class="pct-cell ${heatClassInverse(ratioV)}" title="${titleVenda}">${vendaText}</span>`;
      })()}</td>
      <td><span class="pct-cell ${heatClassInverse(ratioLost)}" title="${titleLost}">${lostText}</span></td>
    </tr>`;
  }).join("");

  document.getElementById("methodology").innerHTML =
    `<strong>Período selecionado:</strong> ${periodRangeLabel(currentPeriod)} (calendário real — atualiza automaticamente conforme os meses passam). <strong>Ticket Médio</strong> e <strong>Ciclo de Venda</strong> vêm do fechamento mensal de metas e do relatório de Ciclo de Ganho do Pipedrive (Jan–Mai/2026), coloridos contra a média do time no período — Ticket Médio: maior é melhor; Ciclo de Venda: menor é melhor (cores invertidas). <strong>Ciclo de Lost</strong> vem do export de negócios perdidos do Pipedrive e também usa lógica invertida (menor = melhor). O filtro de <strong>Porte</strong> afeta apenas o Ciclo de Lost. <strong>% Desconto</strong> aguarda dado de origem.`;
}

document.querySelectorAll("#periodToggle .period-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll("#periodToggle .period-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentPeriod = btn.dataset.period;
    renderAll();
  });
});
document.querySelectorAll("#teamFilter .chip").forEach(chip=>{
  chip.addEventListener("click", ()=>{
    document.querySelectorAll("#teamFilter .chip").forEach(c=>c.classList.remove("active"));
    chip.classList.add("active");
    currentTeam = chip.dataset.team;
    renderAll();
  });
});
document.getElementById("closerSearch").addEventListener("input", (e)=>{ closerQuery = e.target.value; renderAll(); });
document.querySelectorAll("#sortToggle .sort-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{ currentSort.dir = btn.dataset.dir; updateSortToggleUI(); renderAll(); });
});
document.querySelectorAll("#theadRow th[data-key='nome'], #theadRow th[data-key='time'], #theadRow th[data-key='ticket'], #theadRow th[data-key='ciclovenda'], #theadRow th[data-key='ciclolost']").forEach(th=>{
  th.addEventListener("click", ()=>{
    const key = th.dataset.key;
    if(currentSort.key===key){ currentSort.dir = currentSort.dir==="asc"?"desc":"asc"; }
    else { currentSort = {key, dir:"desc"}; }
    updateSortToggleUI();
    renderAll();
  });
});

populateSizeSelect();
updateSortToggleUI();
renderAll();
</script>
</body>
</html>
